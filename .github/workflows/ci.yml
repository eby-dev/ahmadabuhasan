name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: Build & check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install
        run: npm ci

      - name: Format check
        run: npm run format:check

      - name: Type & content check
        run: npm run check

      - name: Build
        run: npm run build

      - name: Upload built site
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist
          retention-days: 3

  a11y:
    name: Accessibility (axe)
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install
        run: npm ci

      - name: Download built site
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Serve site
        run: npx http-server dist -p 4321 -s -c-1 &

      - name: Wait for server
        run: npx wait-on http://localhost:4321/ --timeout 30000

      - name: Run axe-core
        run: npm run a11y
